services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    user: "1000:1000"
    networks:
      - internal
    volumes:
      - ${RUST}/book:/books
      - ${RUST}/audio/book:/audiobooks
      - ${RUST}/audio/podcast:/podcasts
      - ${DOCKERM}/audiobookshelf:/config
      - ${DOCKERM}/audiobookshelf/metadata:/metadata
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.audiobookshelf.rule=Host(`abs.${CASA}`)
      - traefik.http.services.audiobookshelf.loadbalancer.server.port=80
      - traefik.docker.network=internal

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    container_name: shelfmark
    user: "1000:1000"
    networks:
      - internal
    environment:
      FLASK_PORT: 8084
      TZ: ${TZ}
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.shelfmark.rule=Host(`shelf.${CASA}`)
      - traefik.http.services.shelfmark.loadbalancer.server.port=8084
      - traefik.docker.network=internal
    volumes:
      - ${DOCKERM}/shelfmark:/config
      - ${RUST}/book:/book
      - ${RUST}/audio/book:/audiobook

networks:
  internal:
    external: true
