[[stack]]
name = "arr"
tags = ["media", "arr", "public"]
deploy = true
[stack.config]
server = "pbox"
poll_for_updates = true
auto_update = true
git_account = "cwelsys"
repo = "cwelsys/stacks"
run_directory = "media"
file_paths = ["arr.yaml"]
environment = """
SONARR_API_KEY=[[SONARR__API]]
RADARR_API_KEY=[[RADARR__API]]
"""

